<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Anti-AI-Tell Style Guide social preview</title>
  <desc id="desc">A social preview card for the llm-tips repository.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="0.55" stop-color="#f3efe8"/>
      <stop offset="1" stop-color="#e9edf0"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1b1b1b" flood-opacity="0.20"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#22313b" stroke-width="1" opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="url(#paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <path d="M0 520 C160 480 250 570 410 535 C575 498 620 385 790 420 C930 449 1012 570 1200 510 L1200 600 L0 600 Z" fill="#0f766e" opacity="0.12"/>
  <path d="M1042 0 L1200 0 L1200 600 L1106 600 C1140 460 1130 334 1084 220 C1058 155 1040 85 1042 0 Z" fill="#b91c1c" opacity="0.08"/>

  <g filter="url(#soft-shadow)">
    <rect x="82" y="72" width="1036" height="456" rx="24" fill="#fffdf8" stroke="#171717" stroke-width="3"/>
  </g>

  <g transform="translate(118 104)">
    <rect x="0" y="0" width="168" height="42" rx="21" fill="#171717"/>
    <text x="22" y="28" font-family="Liberation Sans, Arial, sans-serif" font-size="18" font-weight="700" fill="#fffdf8" letter-spacing="1.8">LLM-TIPS</text>
    <rect x="186" y="0" width="164" height="42" rx="21" fill="#b91c1c"/>
    <text x="208" y="28" font-family="Liberation Sans, Arial, sans-serif" font-size="18" font-weight="700" fill="#fffdf8" letter-spacing="1.1">STYLE GUIDE</text>
  </g>

  <g transform="translate(118 220)">
    <text font-family="Liberation Sans, Arial, sans-serif" font-size="74" font-weight="700" fill="#171717">
      <tspan x="0" y="0">Anti-AI-Tell</tspan>
      <tspan x="0" y="78">Style Guide</tspan>
    </text>
    <rect x="0" y="106" width="610" height="5" fill="#b91c1c"/>
    <text x="0" y="154" font-family="Liberation Sans, Arial, sans-serif" font-size="30" font-weight="400" fill="#28343d">
      <tspan x="0" dy="0">Evidence-based prose rules for writing</tspan>
      <tspan x="0" dy="40">that does not sound machine-made.</tspan>
    </text>
  </g>

  <g transform="translate(760 132)">
    <rect x="0" y="0" width="292" height="284" rx="18" fill="#17202a"/>
    <rect x="24" y="28" width="244" height="18" rx="9" fill="#fbfaf7" opacity="0.92"/>
    <rect x="24" y="70" width="208" height="14" rx="7" fill="#fbfaf7" opacity="0.34"/>
    <rect x="24" y="100" width="232" height="14" rx="7" fill="#fbfaf7" opacity="0.34"/>
    <rect x="24" y="130" width="178" height="14" rx="7" fill="#fbfaf7" opacity="0.34"/>
    <path d="M39 190 L74 225 L134 161" fill="none" stroke="#0f766e" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M173 170 L232 229 M232 170 L173 229" fill="none" stroke="#b91c1c" stroke-width="16" stroke-linecap="round"/>
  </g>

  <g transform="translate(118 476)" font-family="Liberation Sans, Arial, sans-serif" font-size="23" font-weight="700">
    <text x="0" y="0" fill="#171717">Specificity &gt; abstraction</text>
    <circle cx="288" cy="-7" r="5" fill="#b91c1c"/>
    <text x="316" y="0" fill="#171717">Commitment &gt; balance</text>
    <circle cx="606" cy="-7" r="5" fill="#0f766e"/>
    <text x="634" y="0" fill="#171717">Rhythm &gt; symmetry</text>
  </g>

  <text x="1084" y="504" text-anchor="end" font-family="Liberation Mono, monospace" font-size="21" font-weight="700" fill="#58636d">github.com/mr-k-man/llm-tips</text>
