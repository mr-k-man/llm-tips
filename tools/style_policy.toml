# =====================================================================
# STRUCTURAL BANS
# =====================================================================

[[contracts]]
id = "AIS:ST01"
domain = "structural"
statement = "Do not use negative parallelism constructions ('It's not X, it's Y' / 'Not just X, but Y' / 'Less about X, more about Y')."
applies_to = ["prose", "documentation", "marketing", "code_comments", "commit_messages"]
authority = "Washington Post (Merrill et al.) 13 Nov 2025: 'not just X, but Y' variants in 6% of 328,744 July 2025 ChatGPT messages. Dev.to RLHF/DPO analysis March 2026. WP:AISIGNS AIPARALLEL. Referenced in WRITING_STYLE_RULES_GENERIC.toml STYLE:S04."
evidence_ratio = 0.06
blacklist_regex = [
  "it'?s not\\s+(just\\s+)?[^,.;]+[,.;]\\s*it'?s\\s+",
  "this isn'?t\\s+(just\\s+)?[^,.;]+[,.;]\\s*it'?s\\s+",
  "not only\\s+[^,]+,\\s*but also\\s+",
  "not only\\s+[^,]+,?\\s*but\\s+",
  "less about\\s+[^,]+,\\s*more about\\s+",
  "no\\s+\\w+,\\s*no\\s+\\w+,\\s*just\\s+",
]
match_mode = "regex"
density_threshold = 1
density_per_words = 2000
reviewer_checks = [
  "max 1 negative-parallelism construction per 2,000 words",
  "check each occurrence serves a genuine rhetorical purpose",
]

[[contracts]]
id = "AIS:ST02"
domain = "structural"
statement = "Avoid tricolon density above ~30% of enumerations. Three-item lists are not banned; three-item lists as the default are."
applies_to = ["prose", "documentation", "marketing"]
authority = "LinkedIn analysis (Massobrio 2025) 'Triviality and Rhetorical Triplets'. jpeggdev Rule of Three. WP:AISIGNS RO3."
density_threshold = 0.30
density_metric = "tricolon_fraction_of_enumerations"
reviewer_checks = [
  "no two consecutive paragraphs both using tricolons",
  "list-item counts vary across the document (not exclusively threes)",
]

[[contracts]]
id = "AIS:ST03"
domain = "structural"
statement = "Do not close with 'balanced' three-part conclusions: 'the good news / the challenge / a forward-looking closer' pattern."
applies_to = ["prose", "documentation", "marketing"]
authority = "WP:AISIGNS 'Outline-like conclusions about challenges and future prospects'. jpeggdev Balanced Conclusion."
blacklist_regex = [
  "[Dd]espite (these|its|the)\\s+challenges?[,.]?\\s+",
]
match_mode = "regex"
reviewer_checks = [
  "no 'Despite these challenges... continues to thrive' close pattern",
  "conclusion carries a single claim, not three-part symmetry",
]

[[contracts]]
id = "AIS:ST04"
domain = "structural"
statement = "Do not systematically replace 'is' and 'are' with 'serves as' / 'stands as' / 'represents' / 'marks' / 'features' / 'offers' / 'maintains'."
applies_to = ["prose", "documentation", "marketing"]
authority = "WP:AISIGNS 'Avoidance of basic copulatives': 10% drop in 'is'/'are' frequency in 2023 academic writing. Brown et al. PNAS 2025: GPT-4o 'be'-as-main-verb at 63% of human rate."
blacklist = [
  "serves as",
  "serving as",
  "stands as",
  "represents a",
  "marks the",
  "features a",
  "offers a",
]
match_mode = "phrase_case_insensitive"
density_threshold = 2
density_per_words = 1000
reviewer_checks = [
  "combined density of ersatz-copula phrases no more than 2 per 1,000 words",
  "each usage has a genuine semantic reason beyond 'is/are avoidance'",
]

[[contracts]]
id = "AIS:ST05"
domain = "structural"
statement = "Delete terminal participial ('-ing') phrases that do not add a fact. 'Reflecting broader trends', 'underscoring its importance', 'contributing to', 'highlighting the', 'ensuring continued relevance', 'showcasing how', 'fostering a sense of', 'encompassing' — all decorative."
applies_to = ["prose", "documentation", "marketing"]
authority = "Brown et al. PNAS 2025: instruction-tuned LLMs use present participial clauses at 224-527% of human rate (2-5x). WP:AISIGNS 'Superficial analyses'."
evidence_ratio = 5.27
blacklist_regex = [
  ",\\s+(reflecting|underscoring|emphasizing|emphasising|highlighting|showcasing|contributing to|cultivating|fostering|encompassing|ensuring)\\s+",
]
match_mode = "regex"
density_threshold = 1
density_per_words = 500
reviewer_checks = [
  "terminal decorative-participle clauses no more than 1 per 500 words",
  "each surviving terminal -ing phrase carries a concrete fact",
]

[[contracts]]
id = "AIS:ST06"
domain = "structural"
statement = "Vary paragraph lengths. Coefficient of variation of paragraph word-counts must exceed 0.40."
applies_to = ["prose", "documentation"]
authority = "Kitmul 2026. Pangram 2025. AI paragraph CoV typically 0.15-0.25; human CoV typically 0.40-0.70."
density_threshold = 0.40
density_metric = "paragraph_length_coefficient_of_variation_minimum"
reviewer_checks = [
  "paragraph-length coefficient of variation at least 0.40",
  "document contains at least one paragraph shorter than 40 words and at least one longer than 120 words",
]

[[contracts]]
id = "AIS:ST07"
domain = "structural"
statement = "Vary sentence lengths. Coefficient of variation of sentence word-counts must exceed 0.35."
applies_to = ["prose", "documentation"]
authority = "Kitmul 2026 ('sentence length skewness'). Rewritelyapp 2026."
density_threshold = 0.35
density_metric = "sentence_length_coefficient_of_variation_minimum"
reviewer_checks = [
