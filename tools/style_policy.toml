# Anti-AI-Tell Style Policy (worked example with repo-local paths).
# Machine-readable ruleset for detecting and avoiding LLM-generated writing patterns.
#
# CANONICAL RELEASE TEMPLATE:
#   release/v1/contract-declaration/STYLE_POLICY_ANTI_AI_TELL_GENERIC.toml  (repo-neutral)
#   release/v1/contract-declaration/STYLE_POLICY_ANTI_AI_TELL-_SLUG_.toml   (repo-shaped)
#   release/v1/contract-declaration/AGENT_GUIDE.md                          (how-to)
#   release/v1/contract-declaration/RELEASE.toml                            (manifest)
#
# This file keeps the filled, repo-local variant (absolute paths, no placeholders)
# for copy-forward authoring and for regression testing the validator.
#
# Successor to examples/WRITING_STYLE_RULES_GENERIC.toml, with evidence ratios
# drawn from peer-reviewed / arXiv primary sources.
#
# Companion document: style_guide.md (12,000-word rationale)
# Linter:             tools/lint_writing_style.py
#
# Primary sources:
#   Reinhart/Brown et al., PNAS 2025 (DOI 10.1073/pnas.2422455122) - Biber 66-feature analysis
#   Juzek & Ward, COLING 2025 pp. 6397-6411 - 21 focal words, RLHF causation
#   Juzek & Ward, arXiv:2508.01930 - LHF lexical preference experiments
#   Kobak et al., arXiv:2406.07016 / Scientometrics 2024 - PubMed excess vocabulary
#   McGovern et al., GenAIDetect 2025 - POS-n-gram fingerprints
#   Freeburg, arXiv:2603.27006 - em-dash as markdown leakage, 12-model table
#   Zamaraeva et al., ACL 2025 Long Papers - HPSG syntactic divergence
#   Washington Post (Merrill, Chen, Kumer), 13 Nov 2025 - 328,744 ChatGPT messages
#   Sam Kriss, NYT Magazine, 3 Dec 2025
#   Wikipedia:Signs of AI writing (WP:AISIGNS)
#   Pangram Labs comprehensive guide, 2 Apr 2025
#   jpeggdev/humanize-writing ai-tells reference

