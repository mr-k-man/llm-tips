domain = "rhetorical"
statement = "Do not default to 'both-sides' framing. 'While X is true, it is also important to consider Y' / 'On the one hand ... on the other hand' / 'There are valid arguments on both sides'. Take a position."
applies_to = ["prose", "documentation", "marketing"]
authority = "Dev.to RLHF/DPO analysis March 2026. Cherryleaf 2026 'AI always presents both sides'."
