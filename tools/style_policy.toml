  "document contains at least one sentence shorter than 6 words and at least one longer than 25 words",
]

[[contracts]]
id = "AIS:ST08"
domain = "structural"
statement = "Em-dash frequency must not exceed human baseline range (Freeburg 2026: human mean 3.23 per 1,000 words across 8 published essays)."
applies_to = ["prose", "documentation"]
authority = "Freeburg arXiv:2603.27006 (2026). Human baseline: mean 3.23, range 0.33-17.12 per 1,000 words. Referenced in WRITING_STYLE_RULES_GENERIC.toml STYLE:S02, updated to allow moderate use."
