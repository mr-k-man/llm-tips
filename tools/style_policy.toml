# =====================================================================
# LEXICAL TIER 1 - Absolute bans (appear in all major primary sources)
# Each appears at 300-1,375x human rate in at least one controlled study.
# Density target: zero occurrences in running prose without specific reason.
# =====================================================================

[[contracts]]
id = "AIS:L01"
domain = "lexical_tier1"
statement = "Do not use 'delve', 'delves', 'delving', 'delved'. Use 'look into', 'dig into', 'examine', or rewrite to state the finding directly."
applies_to = ["prose", "documentation", "marketing", "technical_docs", "code_comments"]
authority = "Juzek & Ward COLING 2025: 1,374.92x ChatGPT:human ratio. Kobak et al. 2024: r=25.2 in PubMed 2024 vs 2022. Kriss NYT Mag 2025: 2,700% post-2022 spike."
evidence_ratio = 1374.92
blacklist = ["delve", "delves", "delving", "delved"]
match_mode = "word_boundary_case_insensitive"
density_threshold = 0
reviewer_checks = [
  "zero occurrences of any blacklisted form",
]

[[contracts]]
id = "AIS:L02"
domain = "lexical_tier1"
statement = "Do not use 'tapestry' as metaphor. If you literally mean woven cloth, fine; otherwise delete or replace with a specific noun."
applies_to = ["prose", "documentation", "marketing"]
authority = "Brown et al. PNAS 2025: GPT-4o 155x, GPT-4o Mini 147x human rate. Pangram: 25x overrepresentation vs Project Gutenberg baseline."
evidence_ratio = 155.0
blacklist = ["tapestry", "tapestries", "rich tapestry"]
match_mode = "word_boundary_case_insensitive"
density_threshold = 0
reviewer_checks = [
  "zero metaphorical uses of tapestry",
]

[[contracts]]
id = "AIS:L03"
domain = "lexical_tier1"
statement = "Do not use 'intricate' or 'intricacies'. Use 'detailed', 'complicated', or describe the actual details."
applies_to = ["prose", "documentation", "marketing"]
authority = "Juzek & Ward 2025: 611.24x (intricate), 772.85x (intricacies). Brown et al. 2025: GPT-4o 119x human rate."
evidence_ratio = 772.85
blacklist = ["intricate", "intricacies", "intricately"]
match_mode = "word_boundary_case_insensitive"
density_threshold = 0
reviewer_checks = [
  "zero occurrences",
]

[[contracts]]
