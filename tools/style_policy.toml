domain = "opener_banned"
statement = "Never open with 'In today's fast-paced / ever-evolving / digital / modern / interconnected world', or any 'In today's [noun]' variant."
applies_to = ["prose", "documentation", "marketing"]
authority = "WP:AISIGNS. jpeggdev 'In today's...' family. Cherryleaf 2026."
blacklist = [
  "In today's",
  "In an increasingly",
  "In the ever-evolving",
  "In the ever-changing",
  "In recent years",
  "In the modern",
]
